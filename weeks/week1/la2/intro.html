<!DOCTYPE html>
    <!--lang attribute sets the primery language of the document-->
    <!--html containes machine-readable information-->
<html lang="en-US">
    <head>
        <!--meta declares the document's character encoding.-->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">

        <title>intro to html</title>
    </head>
    <body>
        <h1>intro to html</h1>
        <p>A paragraph containing a hyperlink to <a href="https://www.byupathway.edu">BYU Pathway</a>.</p>
    </body>
</html>
